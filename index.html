<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Clean Map UI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;overflow:hidden;font-family:system-ui;}
#map{position:absolute;inset:0;}

/* 📦 LEFT PANEL */
#panel{
position:absolute;top:12px;left:12px;width:340px;height:calc(100vh - 24px);
background:rgba(15,23,42,.92);
backdrop-filter:blur(12px);
border:1px solid #1f2937;
border-radius:14px;
padding:12px;
color:#fff;
z-index:1000;
overflow-y:auto;
}

#topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
#closeBtn{display:none;background:#ef4444;border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;}

#defaultView{font-size:14px;opacity:.8;}
#placeView{display:none;}

/* 📍 label */
.poi-label{
background:rgba(0,0,0,.6);
color:#fff;
padding:2px 6px;
border-radius:6px;
font-size:11px;
margin-left:6px;
}

/* zoom */
.leaflet-control-zoom{
position:absolute!important;
bottom:20px!important;
right:20px!important;
top:auto!important;
left:auto!important;
}
</style>
</head>

<body>

<div id="panel">
<div id="topbar">
<div><b>🗺️ Explorer</b></div>
<button id="closeBtn">X</button>
</div>

<div id="defaultView">Click anywhere to inspect location or POI.</div>

<div id="placeView">
<h2 id="name"></h2>
<div id="meta"></div>
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([26.5629,-81.9495],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'&copy; OpenStreetMap'
}).addTo(map);

// 🧠 STATE
let selectedMarker=null;

// UI
const defaultView=document.getElementById("defaultView");
const placeView=document.getElementById("placeView");
const closeBtn=document.getElementById("closeBtn");
const nameEl=document.getElementById("name");
const metaEl=document.getElementById("meta");

// 📦 panel switch
function showPlace(d){
defaultView.style.display="none";
placeView.style.display="block";
closeBtn.style.display="block";

nameEl.textContent=d.name;

metaEl.innerHTML=
`<div>${d.type}</div>
<div>${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}</div>`;
}

function reset(){
defaultView.style.display="block";
placeView.style.display="none";
closeBtn.style.display="none";
}

// ❌ close removes selected pin only
closeBtn.onclick=()=>{
if(selectedMarker){map.removeLayer(selectedMarker);selectedMarker=null;}
reset();
};

// 📍 custom pin (ONLY one active)
map.on("click",(e)=>{
const {lat,lng}=e.latlng;

if(selectedMarker){map.removeLayer(selectedMarker);}

selectedMarker=L.marker([lat,lng]).addTo(map);

showPlace({
name:"Selected Location",
type:"User Pin",
lat,lng
});
});


// 🌍 REAL POIs ONLY (no fake data)
async function loadPOIs(){

const query=`[out:json];(
node["amenity"="fuel"](26.45,-82.1,26.75,-81.7);
node["shop"="convenience"](26.45,-82.1,26.75,-81.7);
);out;`;

const url="https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);

try{
const res=await fetch(url);
const data=await res.json();

data.elements.forEach(p=>{
const marker=L.marker([p.lat,p.lon]).addTo(map);

marker.bindTooltip(p.tags.name||"POI",{direction:"right"});

marker.on("click",()=>{
if(selectedMarker){map.removeLayer(selectedMarker);}

selectedMarker=marker;

showPlace({
name:p.tags.name||"Unknown Place",
type:p.tags.amenity||p.tags.shop||"POI",
lat:p.lat,
lng:p.lon
});
});

});

}catch(err){
console.log("POI load failed",err);
}
}

loadPOIs();
</script>

</body>
</html>
