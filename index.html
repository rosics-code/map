<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Map Panel Swap UI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {margin: 0;overflow: hidden;font-family: system-ui;}
#map {position: absolute;inset: 0;}
#panel {position: absolute;top: 12px;left: 12px;width: 340px;height: calc(100vh - 24px);background: rgba(15, 23, 42, 0.92);backdrop-filter: blur(12px);border: 1px solid #1f2937;border-radius: 14px;padding: 14px;color: white;z-index: 1000;overflow: hidden;}
#topbar {display: flex;justify-content: space-between;align-items: center;margin-bottom: 12px;}
#closeBtn {display: none;background: #ef4444;border: none;color: white;width: 28px;height: 28px;border-radius: 6px;cursor: pointer;}
#defaultView {font-size: 14px;opacity: 0.85;}
#placeView {display: none;}
.leaflet-control-zoom {position: absolute !important;bottom: 20px !important;right: 20px !important;top: auto !important;left: auto !important;}
</style>
</head>

<body>

<div id="panel">

  <div id="topbar">
    <div><b>🗺️ Map</b></div>
    <button id="closeBtn">X</button>
  </div>

  <div id="defaultView">Click anywhere on the map to inspect a location.</div>

  <div id="placeView">
    <h2 id="placeName"></h2>
    <div id="placeInfo"></div>
  </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([26.5629, -81.9495], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let currentMarker = null;

// UI elements
const defaultView = document.getElementById("defaultView");
const placeView = document.getElementById("placeView");
const closeBtn = document.getElementById("closeBtn");

const placeName = document.getElementById("placeName");
const placeInfo = document.getElementById("placeInfo");

// 🧠 switch to place mode (FULL REPLACE)
function showPlace(data) {
  defaultView.style.display = "none";
  placeView.style.display = "block";
  closeBtn.style.display = "block";

  placeName.textContent = data.name;
  placeInfo.innerHTML = `
    <p>${data.type}</p>
    <p>Lat: ${data.lat.toFixed(5)}</p>
    <p>Lng: ${data.lng.toFixed(5)}</p>
  `;
}

// 🏠 back to default mode
function resetPanel() {
  defaultView.style.display = "block";
  placeView.style.display = "none";
  closeBtn.style.display = "none";
}

// ❌ X button
closeBtn.onclick = resetPanel;

map.on("click", (e) => {
  const { lat, lng } = e.latlng;

  if (currentMarker) {
    map.removeLayer(currentMarker);
  }

  currentMarker = L.marker([lat, lng]).addTo(map);

  showPlace({
    name: "Selected Location",
    type: "Custom Pin",
    lat,
    lng
  });
});
</script>

</body>
</html>
