<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Map UI Upgrade</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body{margin:0;overflow:hidden;font-family:system-ui;}
#map{position:absolute;inset:0;}

/* 📦 PANEL */
#panel{
position:absolute;top:12px;left:12px;width:360px;height:calc(100vh - 24px);
background:rgba(15,23,42,.92);
backdrop-filter:blur(12px);
border:1px solid #1f2937;
border-radius:14px;
padding:14px;
color:#fff;
z-index:1000;
overflow-y:auto;
}

#topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
#closeBtn{display:none;background:#ef4444;border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;}

#defaultView{font-size:14px;opacity:.75;}
#placeView{display:none;}

/* 📍 NEW CARD UI */
.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
padding:12px;
margin-top:10px;
}

.titleRow{
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
font-size:11px;
padding:2px 8px;
border-radius:999px;
background:#2563eb;
}

.coords{
font-size:12px;
opacity:.8;
margin-top:6px;
}

.actions{
display:flex;
gap:8px;
margin-top:10px;
}

.btn{
flex:1;
background:rgba(255,255,255,.08);
border:none;
color:#fff;
padding:8px;
border-radius:8px;
cursor:pointer;
}

.btn:hover{background:rgba(255,255,255,.15);}

.leaflet-control-zoom{
position:absolute!important;
bottom:20px!important;
right:20px!important;
top:auto!important;
left:auto!important;
}
</style>
</head>

<body>

<div id="panel">

<div id="topbar">
<div><b>🗺️ Explorer</b></div>
<button id="closeBtn">X</button>
</div>

<div id="defaultView">
Click a location or POI to view details.
</div>

<div id="placeView"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const map=L.map('map').setView([26.5629,-81.9495],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'&copy; OpenStreetMap'
}).addTo(map);

// state
let selectedPin=null;
let cluster=L.markerClusterGroup();
map.addLayer(cluster);

// ui
const defaultView=document.getElementById("defaultView");
const placeView=document.getElementById("placeView");
const closeBtn=document.getElementById("closeBtn");

// 📦 REAL CARD UI BUILDER
function showPlace(p){

defaultView.style.display="none";
placeView.style.display="block";
closeBtn.style.display="block";

placeView.innerHTML=`
<div class="card">

<div class="titleRow">
<h2 style="margin:0;font-size:18px;">${p.name}</h2>
<span class="badge">${p.type}</span>
</div>

<div class="coords">
📍 ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}
</div>

<div class="actions">
<button class="btn">Save</button>
<button class="btn">Route</button>
<button class="btn">Share</button>
</div>

</div>
`;
}

function reset(){
defaultView.style.display="block";
placeView.style.display="none";
closeBtn.style.display="none";
}

// close
closeBtn.onclick=()=>{
if(selectedPin) map.removeLayer(selectedPin);
selectedPin=null;
reset();
};

// user pin
map.on("click",(e)=>{
const {lat,lng}=e.latlng;

if(selectedPin) map.removeLayer(selectedPin);

selectedPin=L.marker([lat,lng]).addTo(map);

showPlace({
name:"Island Café",
type:"cafe",
lat,lng
});
});

// POIs (unchanged logic)
let loading=false;

async function loadPOIs(){

if(loading) return;
loading=true;

const b=map.getBounds();

const query=`
[out:json];
(
node["amenity"="fuel"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()});
node["shop"~"convenience|supermarket|mall"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()});
node["amenity"~"restaurant|fast_food|cafe"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()});
);
out;
`;

const url="https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);

try{
const res=await fetch(url);
const data=await res.json();

cluster.clearLayers();

data.elements.forEach(p=>{

const marker=L.marker([p.lat,p.lon]);

marker.on("click",()=>{

if(selectedPin) map.removeLayer(selectedPin);

selectedPin=marker;

showPlace({
name:p.tags.name||"Unnamed Place",
type:p.tags.amenity||p.tags.shop||"POI",
lat:p.lat,
lng:p.lon
});
});

cluster.addLayer(marker);

});

}catch(e){
console.log(e);
}

loading=false;
}

map.on("moveend",loadPOIs);
loadPOIs();
</script>

</body>
</html>
