<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Route Map UI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;overflow:hidden;font-family:system-ui;}
#map{position:absolute;inset:0;}

/* 📦 SIDEBAR */
#panel{
position:absolute;
top:12px;
left:12px;
width:360px;
height:calc(100vh - 24px);

background:rgba(15,23,42,.92);
backdrop-filter:blur(12px);

border:1px solid #1f2937;
border-radius:14px;

padding:12px;
color:#fff;
z-index:1000;

display:flex;
flex-direction:column;
gap:10px;
}

/* tabs */
#tabs{
display:flex;
gap:8px;
}

.tab{
flex:1;
padding:8px;
background:rgba(255,255,255,.06);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.tab.active{
background:#2563eb;
}

/* sections */
.section{
display:none;
flex-direction:column;
gap:8px;
}

.section.active{
display:flex;
}

/* inputs */
input{
padding:8px;
border-radius:8px;
border:1px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.05);
color:white;
outline:none;
}

button.action{
padding:8px;
border-radius:8px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
}

button.action:hover{
opacity:.9;
}

/* zoom */
.leaflet-control-zoom{
position:absolute!important;
bottom:20px!important;
right:20px!important;
top:auto!important;
left:auto!important;
}
</style>
</head>

<body>

<div id="panel">

<!-- 🧭 TABS -->
<div id="tabs">
<button class="tab active" onclick="switchTab('place')">Place</button>
<button class="tab" onclick="switchTab('route')">Route</button>
</div>

<!-- 📍 PLACE VIEW -->
<div id="place" class="section active">
<div id="placeName">Click a location</div>
<div id="placeInfo">No selection yet</div>
</div>

<!-- 🛣️ ROUTE VIEW -->
<div id="route" class="section">

<input id="start" placeholder="Start lat,lng">
<input id="end" placeholder="End lat,lng">

<button class="action" onclick="drawRoute()">Show Route</button>
<button class="action" style="background:#ef4444" onclick="clearRoute()">Clear</button>

</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([26.5629,-81.9495],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'&copy; OpenStreetMap'
}).addTo(map);

// 🧠 state
let selectedMarker=null;
let routeLine=null;

// UI
const placeName=document.getElementById("placeName");
const placeInfo=document.getElementById("placeInfo");

// 🧭 tabs
function switchTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab).classList.add("active");
}

// 📍 place click
map.on("click",(e)=>{
const {lat,lng}=e.latlng;

if(selectedMarker) map.removeLayer(selectedMarker);

selectedMarker=L.marker([lat,lng]).addTo(map);

placeName.textContent="Selected Location";
placeInfo.textContent=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;
});

// 🛣️ ROUTE SYSTEM
function drawRoute(){

const a=document.getElementById("start").value.split(",");
const b=document.getElementById("end").value.split(",");

if(a.length<2||b.length<2) return;

const start=[parseFloat(a[0]),parseFloat(a[1])];
const end=[parseFloat(b[0]),parseFloat(b[1])];

if(routeLine) map.removeLayer(routeLine);

routeLine=L.polyline([start,end],{
color:"#3b82f6",
weight:4
}).addTo(map);

map.fitBounds(routeLine.getBounds());
}

function clearRoute(){
if(routeLine) map.removeLayer(routeLine);
routeLine=null;
}
</script>

</body>
</html>
