<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Smart Map Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body{margin:0;overflow:hidden;font-family:system-ui;}
#map{position:absolute;inset:0;}

#panel{
position:absolute;top:12px;left:12px;width:360px;height:calc(100vh - 24px);
background:rgba(15,23,42,.92);
backdrop-filter:blur(12px);
border:1px solid #1f2937;
border-radius:14px;
padding:12px;
color:#fff;
z-index:1000;
overflow-y:auto;
}

#topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
#closeBtn{display:none;background:#ef4444;border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;}

#defaultView{font-size:14px;opacity:.8;}
#placeView{display:none;}

.leaflet-control-zoom{
position:absolute!important;
bottom:20px!important;
right:20px!important;
top:auto!important;
left:auto!important;
}
</style>
</head>

<body>

<div id="panel">
<div id="topbar">
<div><b>🗺️ Explorer</b></div>
<button id="closeBtn">X</button>
</div>

<div id="defaultView">Move or click the map to explore places.</div>

<div id="placeView">
<h2 id="name"></h2>
<div id="meta"></div>
</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const map = L.map('map').setView([26.5629,-81.9495],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'&copy; OpenStreetMap'
}).addTo(map);

// 🧠 state
let selectedMarker=null;

const panel=document.getElementById("panel");
const defaultView=document.getElementById("defaultView");
const placeView=document.getElementById("placeView");
const closeBtn=document.getElementById("closeBtn");
const nameEl=document.getElementById("name");
const metaEl=document.getElementById("meta");

// 📦 UI
function showPlace(p){
defaultView.style.display="none";
placeView.style.display="block";
closeBtn.style.display="block";

nameEl.textContent=p.name;

metaEl.innerHTML=
`<div>${p.type}</div>
<div>${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</div>`;
}

function reset(){
defaultView.style.display="block";
placeView.style.display="none";
closeBtn.style.display="none";
}

// ❌ close
closeBtn.onclick=()=>{
if(selectedMarker) map.removeLayer(selectedMarker);
selectedMarker=null;
reset();
};

// 📍 single selected pin
map.on("click",(e)=>{
const {lat,lng}=e.latlng;

if(selectedMarker) map.removeLayer(selectedMarker);

selectedMarker=L.marker([lat,lng]).addTo(map);

showPlace({
name:"Selected Location",
type:"Custom Pin",
lat,lng
});
});

// 🌍 POI system (EXPANDED TYPES)
let cluster=L.markerClusterGroup();
map.addLayer(cluster);

let loading=false;

async function loadPOIs(){

if(loading) return;
loading=true;

const b=map.getBounds();

const query=`
[out:json];
(
node["amenity"="fuel"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()});
node["shop"~"convenience|supermarket|mall"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()});
node["amenity"~"restaurant|fast_food|cafe"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()});
node["amenity"~"bank|pharmacy"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()});
node["amenity"="parking"](${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()});
);
out;
`;

const url="https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);

try{
const res=await fetch(url);
const data=await res.json();

cluster.clearLayers();

data.elements.forEach(p=>{
const marker=L.marker([p.lat,p.lon]);

marker.on("click",()=>{

if(selectedMarker) map.removeLayer(selectedMarker);

selectedMarker=marker.addTo(map);

showPlace({
name:p.tags.name||"Unnamed Place",
type:p.tags.amenity||p.tags.shop||"POI",
lat:p.lat,
lng:p.lon
});
});

cluster.addLayer(marker);
});

}catch(e){
console.log("POI error",e);
}

loading=false;
}

map.on("moveend",loadPOIs);
loadPOIs();
</script>

</body>
</html>
