<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google-Style Clean Map Router</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Google Sans', Roboto, Arial, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #f1f3f4; }
        #map { height: 100%; width: 100%; position: absolute; z-index: 1; }
        .sidebar { position: absolute; top: 12px; left: 12px; width: 360px; background: #fff; z-index: 1000; padding: 18px; border-radius: 16px; box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15); display: flex; flex-direction: column; gap: 14px; max-height: calc(100vh - 24px); overflow-y: auto; }
        h2 { margin: 0; font-size: 18px; color: #202124; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .tabs { display: flex; border-bottom: 1px solid #dadce0; margin-bottom: -4px; }
        .tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 500; color: #5f6368; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
        .input-box-wrapper { position: relative; display: flex; align-items: center; background: #f1f3f4; border-radius: 8px; padding: 2px 8px; border: 1px solid transparent; }
        .input-box-wrapper:focus-within { background: #fff; border-color: #1a73e8; box-shadow: 0 1px 2px rgba(60,64,67,0.3); }
        .input-icon { color: #5f6368; font-size: 14px; margin-right: 8px; user-select: none; }
        input { width: 100%; padding: 10px 0; border: none; background: transparent; font-size: 14px; color: #3c4043; outline: none; }
        .clear-btn { color: #70757a; cursor: pointer; font-size: 16px; font-weight: bold; padding: 0 5px; user-select: none; }
        .geo-btn { display: none; padding: 10px; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 8px; border: 1px solid #dadce0; background: #fff; color: #1a73e8; text-align: center; margin-top: 2px; }
        .btn-route { background: #1a73e8; color: #fff; border: none; padding: 12px; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; box-shadow: 0 1px 2px rgba(60,64,67,0.3); }
        .btn-route:hover { background: #1557b0; }
        .btn-back { background: none; border: none; color: #1a73e8; font-size: 13px; font-weight: 500; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; }
        .autocomplete-menu { position: absolute; top: 46px; left: 0; right: 0; background: white; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 2000; box-shadow: 0 4px 12px rgba(60,64,67,0.2); border: 1px solid #dadce0; display: none; }
        .autocomplete-item { padding: 10px 14px; font-size: 13px; cursor: pointer; color: #3c4043; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .autocomplete-item:hover { background: #f1f3f4; }
        .summary-card { background: #e8f0fe; border-radius: 8px; padding: 12px; color: #1967d2; font-size: 14px; margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; }
        .summary-card.selected { border-color: #1a73e8; background: #d2e3fc; }
        .accordion-header { background: #f8f9fa; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #3c4043; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #dadce0; margin-top: 5px; }
        .accordion-content { display: none; flex-direction: column; max-height: 300px; overflow-y: auto; border: 1px solid #e8eaed; border-top: none; border-radius: 0 0 8px 8px; padding: 0 12px; }
        .direction-item { font-size: 13px; padding: 12px 0; border-bottom: 1px solid #e8eaed; color: #3c4043; display: flex; gap: 8px; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar" id="inputPanel">
        <h2>📍 Google Maps Router</h2>
        
        <div class="tabs">
            <div class="tab active" data-mode="car">🚗 Drive</div>
            <div class="tab" data-mode="foot">🚶 Walk</div>
            <div class="tab" data-mode="bike">🚴 Bike</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; position: relative;">
            <div class="input-box-wrapper">
                <span class="input-icon">⚪</span>
                <input type="text" id="pointA" placeholder="Choose starting point..." autocomplete="off">
                <span class="clear-btn" id="clearA" style="display:none;">&times;</span>
            </div>
            <div class="autocomplete-menu" id="menuA"></div>
            <div class="geo-btn" id="locateA">🧭 Use current location</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; position: relative;">
            <div class="input-box-wrapper">
                <span class="input-icon">🔴</span>
                <input type="text" id="pointB" placeholder="Choose destination..." autocomplete="off">
                <span class="clear-btn" id="clearB" style="display:none;">&times;</span>
            </div>
            <div class="autocomplete-menu" id="menuB"></div>
        </div>

        <button class="btn-route" id="getDirections">Get Directions</button>
    </div>

    <div class="sidebar" id="directionsPanel" style="display: none;">
        <button class="btn-back" id="btnBack">← Back to edit</button>
        <h2 style="font-size: 16px; margin-top: 4px;">Available Routes</h2>
        <div id="routesListContainer"></div>
        
        <div class="accordion-header" id="toggleDirections">
            <span>📋 Step-by-step Directions</span>
            <span id="arrowIcon">▼</span>
        </div>
        <div class="accordion-content" id="stepsContainer"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([39.8283, -98.5795], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let routingControl = null;
        let currentMode = 'car';
        let foundRoutes = [];

        const inputA = document.getElementById('pointA');
        const inputB = document.getElementById('pointB');
        const btnLocateA = document.getElementById('locateA');
        const menuA = document.getElementById('menuA');
        const menuB = document.getElementById('menuB');
        const clearA = document.getElementById('clearA');
        const clearB = document.getElementById('clearB');
        
        const inputPanel = document.getElementById('inputPanel');
        const directionsPanel = document.getElementById('directionsPanel');
        const routesListContainer = document.getElementById('routesListContainer');
        const stepsContainer = document.getElementById('stepsContainer');

        // Travel Mode Tabs Logic
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentMode = e.target.dataset.mode;
                if (inputA.value && inputB.value && directionsPanel.style.display === 'flex') {
                    document.getElementById('getDirections').click();
                }
            });
        });

        // Input Focus Configurations
        inputA.addEventListener('focus', () => btnLocateA.style.display = 'block');
        inputA.addEventListener('blur', () => setTimeout(() => btnLocateA.style.display = 'none', 250));

        const toggleClearBtn = (input, btn) => { btn.style.display = input.value ? 'block' : 'none'; };
        inputA.addEventListener('input', () => toggleClearBtn(inputA, clearA));
        inputB.addEventListener('input', () => toggleClearBtn(inputB, clearB));
        
        clearA.addEventListener('click', () => { inputA.value = ''; clearA.style.display = 'none'; delete inputA.dataset.lat; delete inputA.dataset.lng; });
        clearB.addEventListener('click', () => { inputB.value = ''; clearB.style.display = 'none'; delete inputB.dataset.lat; delete inputB.dataset.lng; });

        const triggerEnterSubmit = (e) => { if (e.key === 'Enter') document.getElementById('getDirections').click(); };
        inputA.addEventListener('keydown', triggerEnterSubmit);
        inputB.addEventListener('keydown', triggerEnterSubmit);

        // Help format duration nicely from seconds into Hours and Minutes
        function formatTime(seconds) {
            let minutes = Math.round(seconds / 60);
            if (minutes < 60) return `${minutes} mins`;
            let hours = Math.floor(minutes / 60);
            let remMinutes = minutes % 60;
            return remMinutes > 0 ? `${hours} hr ${remMinutes} min` : `${hours} hr`;
        }

        // Live Address Suggestions Dropdown Logic
        async function handleAutocomplete(inputElement, menuElement) {
            let query = inputElement.value;
            if (query.length < 3) { menuElement.style.display = 'none'; return; }
            try {
                let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                let data = await res.json();
                menuElement.innerHTML = '';
                if(data.length === 0) { menuElement.style.display = 'none'; return; }
                
                data.forEach(item => {
                    let div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    div.innerText = item.display_name;
                    div.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        inputElement.value = item.display_name;
                        inputElement.dataset.lat = item.lat;
                        inputElement.dataset.lng = item.lon;
                        menuElement.style.display = 'none';
                        toggleClearBtn(inputElement, inputElement === inputA ? clearA : clearB);
                    });
                    menuElement.appendChild(div);
                });
                menuElement.style.display = 'block';
            } catch (err) { console.log(err); }
        }

        let debounceTimer;
        inputA.addEventListener('input', () => {
            delete inputA.dataset.lat; delete inputA.dataset.lng;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => handleAutocomplete(inputA, menuA), 250);
        });
        inputB.addEventListener('input', () => {
            delete inputB.dataset.lat; delete inputB.dataset.lng;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => handleAutocomplete(inputB, menuB), 250);
        });

        inputA.addEventListener('blur', () => setTimeout(() => menuA.style.display = 'none', 200));
        inputB.addEventListener('blur', () => setTimeout(() => menuB.style.display = 'none', 200));

        function useGPS(inputField) {
            if (!navigator.geolocation) return alert("GPS not supported");
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                inputField.dataset.lat = lat;
                inputField.dataset.lng = lon;
                
                try {
                    let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    let data = await res.json();
                    inputField.value = data.display_name || `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                } catch {
                    inputField.value = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                }
                toggleClearBtn(inputField, inputField === inputA ? clearA : clearB);
                map.setView([lat, lon], 14);
            });
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                map.setView([position.coords.latitude, position.coords.longitude], 13);
            });
        }

        btnLocateA.addEventListener('mousedown', (e) => { e.preventDefault(); useGPS(inputA); });

        async function fetchCoords(address) {
            let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
            let data = await res.json();
            if (data && data.length > 0) return L.latLng(data[0].lat, data[0].lon);
            throw new Error("Location not found: " + address);
        }

        // Accordion directions dropdown logic toggler
        document.getElementById('toggleDirections').addEventListener('click', () => {
            const content = document.getElementById('stepsContainer');
            const arrow = document.getElementById('arrowIcon');
            if (content.style.display === 'flex') {
                content.style.display = 'none';
                arrow.innerText = '▼';
            } else {
                content.style.display = 'flex';
                arrow.innerText = '▲';
            }
        });

        // Display specific selected index route directions inside accordion panel
        function selectRouteOption(index) {
            document.querySelectorAll('.summary-card').forEach((c, idx) => {
                c.classList.toggle('selected', idx === index);
            });

            // Update visible highlighted alternative track line on the map layout
            if (routingControl) {
                routingControl.selectRoute(foundRoutes[index]);
            }

            let route = foundRoutes[index];
            stepsContainer.innerHTML = '';
            
            route.instructions.forEach((step, idx) => {
                let stepDiv = document.createElement('div');
                stepDiv.className = 'direction-item';
                stepDiv.innerHTML = `<div><b>${idx + 1}.</b></div> <div>${step.text} <span style="color:#70757a; font-size:11px; display:block;">(${(step.distance / 1609.34).toFixed(2)} mi)</span></div>`;
                stepsContainer.appendChild(stepDiv);
            });
        }

        document.getElementById('getDirections').addEventListener('click', async () => {
            if (!inputA.value || !inputB.value) return alert("Please enter both a start point and destination!");
            
            const actionBtn = document.getElementById('getDirections');
            actionBtn.innerText = "Calculating Route...";

            try {
                let coordA = (inputA.dataset.lat) ? L.latLng(inputA.dataset.lat, inputA.dataset.lng) : await fetchCoords(inputA.value);
                let coordB = (inputB.dataset.lat) ? L.latLng(inputB.dataset.lat, inputB.dataset.lng) : await fetchCoords(inputB.value);

                if (routingControl) { map.removeControl(routingControl); routingControl = null; }

                // Determine dynamic profiling setups based on tab choices
                let routerUrl = 'https://router.project-osrm.org/route/v1';
                if (currentMode === 'foot') routerUrl = 'https://router.project-osrm.org/route/v1/foot';
                if (currentMode === 'bike') routerUrl = 'https://router.project-osrm.org/route/v1/bicycle';

                routingControl = L.Routing.control({
                    waypoints: [coordA, coordB],
                    router: L.Routing.osrmv1({ serviceUrl: routerUrl, profile: currentMode }),
                    altLineOptions: { styles: [{ color: '#70757a', opacity: 0.6, weight: 5 }] },
                    lineOptions: { styles: [{ color: '#1a73e8', opacity: 0.9, weight: 6 }] },
                    addWaypoints: false,
                    showAlternatives: true,
                    createMarker: (i, wp) => L.marker(wp.latLng).bindPopup(`<b>${i === 0 ? 'Start' : 'Destination'}</b>`)
                }).addTo(map);

                routingControl.on('routesfound', function(e) {
                    foundRoutes = e.routes;
                    routesListContainer.innerHTML = '';
                    
                    const routeBounds = L.latLngBounds([coordA, coordB]);
                    map.fitBounds(routeBounds, { padding: [50, 50] });

                    foundRoutes.forEach((route, index) => {
                        let summary = route.summary;
                        let textDump = JSON.stringify(route.instructions).toLowerCase();
                        
                        // Condition validation logic checker to search out if matching localized key tokens found
                        let containsTolls = textDump.includes('toll') || textDump.includes('tollway') || textDump.includes('turnpike');
                        let tollButtonHTML = containsTolls ? 
                            `<button class="btn-route" style="background:#f9ab00; font-size:11px; padding:4px 8px; margin-top:8px; width:100%; border-radius:4px;" onclick="event.stopPropagation(); alert('Notice: This explicit alternative route option passes through toll roads. Ensure your electronic tag is active.')">⚠️ Route Contains Tolls</button>` : '';

                        let card = document.createElement('div');
                        card.className = `summary-card ${index === 0 ? 'selected' : ''}`;
                        card.innerHTML = `
                            <b>Option ${index + 1}: ${formatTime(summary.totalTime)}</b><br>
                            <span style="font-size:12px; color:#5f6368;">Distance: ${(summary.totalDistance / 1609.34).toFixed(1)} miles</span>
                            ${tollButtonHTML}
                        `;
                        
                        card.addEventListener('click', () => selectRouteOption(index));
                        routesListContainer.appendChild(card);
                    });

                    // Trigger structural configuration loader on first index choice natively
                    selectRouteOption(0);

                    inputPanel.style.display = 'none';
                    directionsPanel.style.display = 'flex';
                });

            } catch (err) { 
                alert(err.message); 
            } finally {
                actionBtn.innerText = "Get Directions";
            }
        });

        document.getElementById('btnBack').addEventListener('click', () => {
            directionsPanel.style.display = 'none';
            inputPanel.style.display = 'flex';
            if (routingControl) { map.removeControl(routingControl); routingControl = null; }
        });
    </script>
</body>
</html>
